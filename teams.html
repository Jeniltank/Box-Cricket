<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Teams - Box Cricket</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { 
            background: #0b0f19; 
            overflow-y: auto; 
            padding-bottom: 50px;
        }
        
        .admin-header { 
            padding: 25px; 
            text-align: center; 
            color: white; 
            font-size: 28px;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(0,0,0,0.4);
            margin-bottom: 20px;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 40px;
        }
        .admin-header span { color: var(--primary-accent); }
        
        .teams-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .team-card {
            background: rgba(15, 20, 35, 0.8); 
            border-radius: 16px; 
            border: 1px solid rgba(0, 123, 255, 0.2); 
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            min-height: 500px;
        }
        
        .team-a-card { border-color: var(--primary-accent); }
        .team-b-card { border-color: #00E5FF; }
        
        .card-title {
            margin-bottom: 25px;
            font-size: 24px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
            font-weight: 800;
        }
        
        .team-a-title { color: var(--primary-accent); }
        .team-b-title { color: #00E5FF; }

        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .input-group input {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            font-family: var(--font-main);
            font-size: 18px;
            font-weight: 500;
            transition: all 0.3s;
            outline: none;
        }
        
        .input-group input:focus {
            border-color: var(--primary-accent);
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.3);
            background: rgba(0,0,0,0.6);
        }

        .btn-add {
            padding: 0 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        
        .btn-team-a { background: linear-gradient(135deg, var(--primary-accent), #0056b3); color: white; }
        .btn-team-b { background: rgba(0, 229, 255, 0.8); color: #001A33; }
        
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.1); }
        
        .player-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .player-list li {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            color: white;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .player-list li:hover { background: rgba(0,0,0,0.5); }
        
        .btn-remove {
            background: rgba(244, 67, 54, 0.1);
            color: #F44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
            border-radius: 6px;
            width: 35px;
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .btn-remove:hover { background: rgba(244, 67, 54, 0.3); }

        .btn-back {
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.2s;
        }
        .btn-back:hover { background: rgba(255,255,255,0.2); }
        .team-name-input {
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: inherit;
            font-family: inherit;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            outline: none;
            transition: all 0.3s;
            width: 150px;
        }
        .team-name-input:hover, .team-name-input:focus {
            border-bottom: 2px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.2);
        }
        .btn-save-teams {
            background: linear-gradient(135deg, var(--primary-accent), #0056b3);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
            transition: all 0.2s;
        }
        .btn-save-teams:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.6);
        }
    </style>
</head>
<body>

    <div class="admin-header">
        <div style="flex:1; text-align: left;"><a href="admin.html" class="btn-back">⬅ BACK TO DASHBOARD</a></div>
        <div style="flex:2; text-align: center;">BOX CRICKET <span id="team-header-action">ADD NEW TEAM</span></div>
        <div style="flex:1; text-align: right; display: flex; justify-content: flex-end; align-items: center; gap: 10px;">
            <button class="btn-save-teams" id="btn-cancel-edit" onclick="cancelEditing()" style="display: none; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; transition: all 0.2s;">CANCEL</button>
            <button class="btn-save-teams" id="btn-save-single" onclick="saveSingleTeam()">SAVE TEAM TO DATABASE</button>
        </div>
    </div>
    
    <div style="text-align: center; margin-bottom: 25px; display: flex; justify-content: center; align-items: center; gap: 15px;">
        <label style="color: white; font-size: 20px; font-weight: 800; letter-spacing: 1.5px;">CATEGORY:</label>
        <select id="team-category" onchange="updateTeamNames()" style="padding: 10px 20px; font-size: 18px; border-radius: 8px; background: rgba(0,0,0,0.6); color: white; border: 2px solid var(--primary-accent); outline: none; font-family: var(--font-main); font-weight: bold; cursor: pointer;">
            <option value="MAN">MAN</option>
            <option value="WOMAN">WOMAN</option>
            <option value="COUPAL">COUPAL</option>
        </select>
    </div>

    <div class="teams-container" style="grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); max-width: 1200px;">
        
        <!-- TEAM 1 CARD -->
        <div class="team-card team-a-card">
            <div style="display:flex; align-items:center; margin-bottom:25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom:15px;">
                <input type="text" id="single-team-name" class="team-name-input team-a-title" value="TEAM 1">
                <span style="font-size: 24px; font-weight: 800; color: #888; margin-left: 10px; letter-spacing: 1.5px;">ROSTER</span>
            </div>
            <div class="input-group">
                <input type="text" id="input-single-team-player" placeholder="Enter Player Name..." onkeypress="handleEnterSingle(event)">
                <button class="btn-add btn-team-a" onclick="addPlayerSingleTeam()">ADD</button>
            </div>
            <ul id="single-team-list" class="player-list">
                <!-- Injected via JS -->
            </ul>
        </div>

        <!-- EXISTING TEAMS CARD -->
        <div class="team-card" style="border-color: #00E5FF; min-height: 500px;">
            <div style="display:flex; align-items:center; margin-bottom:25px; border-bottom: 1px solid rgba(0, 229, 255, 0.2); padding-bottom:15px;">
                <span style="font-size: 24px; font-weight: 800; color: #00E5FF; letter-spacing: 1.5px;">SAVED TEAMS IN DATABASE</span>
            </div>
            <div id="existing-teams-list" style="display: flex; flex-direction: column; gap: 20px; max-height: 500px; overflow-y: auto; padding-right: 5px;">
                <!-- Injected via JS -->
            </div>
        </div>
        
    </div>

    <!-- Hidden elements for image processing -->
    <input type="file" id="image-upload" accept="image/*" style="display: none;">
    <canvas id="image-canvas" style="display: none;"></canvas>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="teams.js"></script>
</body>
</html>
